<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tablero de Insumos — Coordinación de Emergencia</title>

  <!-- Meta tags generales -->
  <meta name="description" content="Plataforma en tiempo real para hospitales y centros de acopio. Reporta faltantes y excedentes de insumos médicos, coordina la distribución y visualiza alertas en el mapa. Emergencia, rescate y logística humanitaria." />
  <meta name="keywords" content="insumos médicos, emergencia, centros de acopio, hospitales, donaciones, distribución, rescate, Venezuela" />
  <meta name="robots" content="index, follow" />
  <meta name="language" content="es" />

  <!-- Open Graph / Facebook / WhatsApp -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Tablero de Insumos — Coordinación de Emergencia" />
  <meta property="og:description" content="Reporta en tiempo real qué insumos faltan o sobran en hospitales y centros de acopio. Coordina la distribución de manera ordenada y eficiente." />
  <meta property="og:image" content="https://placehold.co/1200x630/1e293b/3b82f6?text=Tablero+de+Insumos&font=raleway" />
  <meta property="og:url" content="https://centro-suministro-venezuela.up.railway.app" />
  <meta property="og:locale" content="es_VE" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Tablero de Insumos — Coordinación de Emergencia" />
  <meta name="twitter:description" content="Reporta en tiempo real qué insumos faltan o sobran. Coordina la distribución de manera ordenada y eficiente." />
  <meta name="twitter:image" content="https://placehold.co/1200x630/1e293b/3b82f6?text=Tablero+de+Insumos&font=raleway" />

  <!-- Tema de color para navegadores móviles -->
  <meta name="theme-color" content="#0f172a" />

  <!-- Leaflet (mapa) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Socket.io cliente -->
  <script src="/socket.io/socket.io.js"></script>

  <style>
    /* ─── Reset y variables ─────────────────────────────────────── */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --color-bg: #0f172a;
      --color-surface: #1e293b;
      --color-text: #f1f5f9;
      --color-muted: #94a3b8;
      --color-falta: #ef4444;
      --color-sobra: #22c55e;
      --color-primary: #3b82f6;
      --radius: 12px;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      padding: 1.5rem 1rem;
    }

    /* ─── Layout de dos columnas en escritorio ─────────────────── */
    #app-layout {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    @media (min-width: 1024px) {
      body {
        padding: 1.5rem 2rem;
      }

      #app-layout {
        flex-direction: row;
        align-items: stretch;
        height: calc(100vh - 3rem - 80px);
      }

      #sidebar {
        width: 300px;
        flex-shrink: 0;
        overflow-y: auto;
        height: 100%;
      }

      #sidebar form {
        height: 100%;
      }

      #content {
        flex: 1;
        min-width: 0;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1.5rem;
        min-height: 0;
      }

      .map-col {
        display: flex;
        flex-direction: column;
        min-height: 0;
      }

      .feed-col {
        display: flex;
        flex-direction: column;
        min-height: 0;
        overflow-y: auto;
      }

      #map-container {
        flex: 1;
        height: auto;
        min-height: 300px;
        margin-bottom: 0;
      }

      .search-container {
        margin-bottom: 0.75rem;
      }

      .map-toggle {
        display: none;
      }
    }

    /* ─── Header ──────────────────────────────────────────────── */
    header {
      text-align: center;
      margin-bottom: 1.5rem;
      max-width: 1400px;
      margin-left: auto;
      margin-right: auto;
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    header p {
      color: var(--color-muted);
      font-size: 0.95rem;
      margin-top: 0.3rem;
    }

    /* ─── Formulario ──────────────────────────────────────────── */
    #sidebar form {
      background: var(--color-surface);
      padding: 1.5rem;
      border-radius: var(--radius);
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    #sidebar form label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--color-muted);
    }

    #sidebar form input,
    #sidebar form select {
      background: var(--color-bg);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 0.7rem 0.9rem;
      color: var(--color-text);
      font-size: 1rem;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
    }

    #sidebar form input:focus,
    #sidebar form select:focus {
      border-color: var(--color-primary);
    }

    @media (max-width: 1023px) {
      #sidebar form {
        max-width: 500px;
      }

      #sidebar {
        margin: 0 auto;
        width: 100%;
        max-width: 500px;
      }

      #content {
        width: 100%;
        max-width: 800px;
        margin: 0 auto;
      }
    }

    .btn {
      background: var(--color-primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.75rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-atender {
      background: var(--color-primary);
      border: none;
      color: #fff;
      border-radius: 8px;
      padding: 0.4rem 0.8rem;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }

    .btn-atender:hover {
      opacity: 0.9;
    }

    .btn-ruta:hover {
      border-color: var(--color-primary);
      color: var(--color-primary);
    }

    .btn-ruta {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--color-muted);
      border-radius: 8px;
      padding: 0.3rem 0.6rem;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
    }

    .btn-ruta:hover {
      border-color: #22c55e;
      color: #22c55e;
    }

    .card {
      cursor: pointer;
    }

    .card:hover {
      border-color: var(--color-primary);
    }

    .btn-compartir {
      background: transparent;
      border: none;
      color: var(--color-muted);
      font-size: 0.9rem;
      cursor: pointer;
      padding: 0.2rem 0.3rem;
      transition: color 0.2s;
      line-height: 1;
    }

    .btn-compartir:hover {
      color: var(--color-primary);
    }

    .cp-icon {
      display: inline;
    }

    @media (min-width: 768px) {
      .cp-icon {
        display: none;
      }
    }

    @media (max-width: 767px) {
      .cp-text {
        display: none;
      }
    }

    /* ─── Grid de tarjetas ────────────────────────────────────── */
    #tablero {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .card {
      background: var(--color-surface);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: baseline;
      gap: 1rem;
      border-left: 5px solid var(--color-muted);
      animation: fadeIn 0.3s ease;
      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    .card.falta {
      border-left-color: var(--color-falta);
    }

    .card.sobra {
      border-left-color: var(--color-sobra);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card-info {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .card-info .centro {
      font-weight: 600;
      font-size: 1rem;
    }

    .card-info .insumo {
      color: var(--color-muted);
      font-size: 0.9rem;
    }

    .card-badge {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      padding: 0.35rem 0.8rem;
      border-radius: 999px;
      white-space: nowrap;
    }

    .card.falta .card-badge {
      background: rgba(239, 68, 68, 0.2);
      color: var(--color-falta);
    }

    .card.sobra .card-badge {
      background: rgba(34, 197, 94, 0.2);
      color: var(--color-sobra);
    }

    .card time {
      font-size: 0.7rem;
      color: #cbd5e1;
      display: block;
      margin-top: 0.15rem;
    }

    .card-actions {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    /* Estado resolviendo (fade-out) */
    .card.resolviendo {
      opacity: 0.5;
      transition: opacity 0.5s ease;
      pointer-events: none;
    }

    /* ─── Filtros rápidos ──────────────────────────────────────── */
    #filtros {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      width: 100%;
    }

    .btn-filtro {
      background: var(--color-surface);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--color-muted);
      border-radius: 8px;
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-filtro:hover {
      border-color: var(--color-primary);
      color: var(--color-text);
    }

    .btn-filtro.activo {
      background: var(--color-primary);
      border-color: var(--color-primary);
      color: #fff;
    }

    /* ─── Mapa ────────────────────────────────────────────────── */
    #map-container {
      width: 100%;
      height: 350px;
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 1.5rem;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    @media (min-width: 1024px) {
      #map-container {
        height: 400px;
      }
    }

    #map-container .leaflet-container {
      background: var(--color-surface);
    }

    /* ─── Buscador de lugares ─────────────────────────────────── */
    .search-container {
      position: relative;
      width: 100%;
      margin-bottom: 0.75rem;
    }

    .search-container input {
      width: 100%;
      padding: 0.7rem 0.9rem;
      border-radius: var(--radius);
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: var(--color-surface);
      color: var(--color-text);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-container input:focus {
      border-color: var(--color-primary);
    }

    .search-container input::placeholder {
      color: var(--color-muted);
    }

    .search-results {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: var(--color-surface);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: var(--radius);
      max-height: 220px;
      overflow-y: auto;
      z-index: 1001;
      display: none;
      list-style: none;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
    }

    .search-results.visible {
      display: block;
    }

    .search-results li {
      padding: 0.65rem 0.9rem;
      cursor: pointer;
      font-size: 0.85rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      transition: background 0.15s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .search-results li:last-child {
      border-bottom: none;
    }

    .search-results li:hover {
      background: rgba(59, 130, 246, 0.12);
    }

    .search-results li .sr-icon {
      font-size: 1rem;
      flex-shrink: 0;
    }

    .search-results li .sr-name {
      font-weight: 600;
    }

    .search-results li .sr-dir {
      color: var(--color-muted);
      font-size: 0.75rem;
    }

    /* Ubicación en formulario */
    .ubicacion-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .ubicacion-row input {
      flex: 1;
    }

    .btn-ubicacion {
      background: var(--color-surface);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--color-muted);
      border-radius: 8px;
      padding: 0.7rem;
      font-size: 0.85rem;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .btn-ubicacion:hover {
      border-color: var(--color-primary);
      color: var(--color-primary);
    }

    .btn-ubicacion.obteniendo {
      opacity: 0.5;
      pointer-events: none;
    }

    /* ─── Estados vacío / error ───────────────────────────────── */
    .empty-msg {
      text-align: center;
      color: var(--color-muted);
      padding: 3rem 0;
      font-style: italic;
    }

    #error-msg {
      background: rgba(239, 68, 68, 0.15);
      color: var(--color-falta);
      padding: 0.6rem 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      display: none;
      width: 100%;
      margin-bottom: 1rem;
      text-align: center;
    }

    #error-msg.visible {
      display: block;
    }



    /* ─── Onboarding ──────────────────────────────────────────── */
    #onboarding {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }

    #onboarding.hidden {
      display: none;
    }

    .onboarding-card {
      background: var(--color-surface);
      border-radius: var(--radius);
      padding: 2rem 1.5rem 1.5rem;
      max-width: 420px;
      width: 90%;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .onboarding-card .icon {
      font-size: 2.5rem;
      margin-bottom: 0.75rem;
    }

    .onboarding-card h2 {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .onboarding-card p {
      color: var(--color-muted);
      font-size: 0.9rem;
      line-height: 1.5;
      margin-bottom: 1.5rem;
    }

    .onboarding-card .dots {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }

    .onboarding-card .dots span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.15);
      transition: background 0.3s;
    }

    .onboarding-card .dots span.active {
      background: var(--color-primary);
    }

    .onboarding-card .btn-row {
      display: flex;
      gap: 0.75rem;
    }

    .onboarding-card .btn-row button {
      flex: 1;
      padding: 0.65rem;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.2s;
    }

    .onboarding-card .btn-saltar {
      background: transparent;
      color: var(--color-muted);
      border: 1px solid rgba(255, 255, 255, 0.1) !important;
    }

    .onboarding-card .btn-siguiente {
      background: var(--color-primary);
      color: #fff;
    }

    .onboarding-card .btn-siguiente:hover {
      opacity: 0.9;
    }

    .onboarding-card .btn-saltar:hover {
      border-color: var(--color-primary);
      color: var(--color-text);
    }

    /* ─── Reporte rápido ──────────────────────────────────────── */
    #reporte-rapido {
      margin-top: 0.5rem;
    }

    #reporte-rapido h3 {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--color-muted);
      margin-bottom: 0.75rem;
    }

    .rapido-toggle {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }

    .rapido-toggle button {
      flex: 1;
      padding: 0.4rem;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: transparent;
      color: var(--color-muted);
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .rapido-toggle button.activo {
      background: var(--color-primary);
      border-color: var(--color-primary);
      color: #fff;
    }

    .rapido-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.4rem;
    }

    .btn-rapido {
      padding: 0.5rem;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: var(--color-bg);
      color: var(--color-text);
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
      line-height: 1.3;
    }

    .btn-rapido:hover {
      border-color: var(--color-primary);
      background: rgba(59, 130, 246, 0.1);
    }

    .btn-rapido:active {
      transform: scale(0.96);
    }

    .btn-rapido .emoji {
      font-size: 1.1rem;
      display: block;
      margin-bottom: 0.15rem;
    }

    .btn-rapido .label {
      font-size: 0.7rem;
      color: var(--color-muted);
    }

    /* ─── Toggle mapa en mobile ────────────────────────────────── */
    .map-toggle {
      display: none;
      width: 100%;
      padding: 0.7rem;
      border-radius: var(--radius);
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: var(--color-surface);
      color: var(--color-text);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 0.75rem;
      transition: all 0.2s;
    }

    .map-toggle:hover {
      border-color: var(--color-primary);
    }

    @media (max-width: 1023px) {
      .map-toggle {
        display: block;
      }

      .map-col.collapsed #map-container {
        display: none;
      }

      #app-layout.tab-reportar #sidebar { display: block; }
      #app-layout.tab-reportar #content { display: none; }
      #app-layout.tab-tablero #sidebar { display: none; }
      #app-layout.tab-tablero #content { display: block; }
    }

    /* ─── Tabs móviles ───────────────────────────────────────── */
    #mobile-tabs {
      display: none;
      gap: 0.5rem;
      margin-bottom: 1rem;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }

    .tab-btn {
      flex: 1;
      padding: 0.7rem;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      background: var(--color-surface);
      color: var(--color-muted);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .tab-btn.activo {
      background: var(--color-primary);
      border-color: var(--color-primary);
      color: #fff;
    }

    @media (max-width: 1023px) {
      #mobile-tabs { display: flex; }
    }

    @media (min-width: 1024px) {
      #mobile-tabs { display: none !important; }
    }

    /* ─── Responsive ──────────────────────────────────────────── */
    @media (max-width: 480px) {
      .card {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>

</head>

<body>

  <!-- Onboarding (primera vez) -->
  <div id="onboarding">
    <div class="onboarding-card">
      <div class="icon" id="onb-icon">📝</div>
      <h2 id="onb-title">Reporta un insumo</h2>
      <p id="onb-text">Completa los datos del centro, insumo y ubicación en el formulario, luego presiona <strong>Reportar insumo</strong>.</p>
      <div class="dots">
        <span class="active"></span>
        <span></span>
        <span></span>
      </div>
      <div class="btn-row">
        <button class="btn-saltar" id="onb-saltar">Saltar</button>
        <button class="btn-siguiente" id="onb-siguiente">Siguiente</button>
      </div>
    </div>
  </div>

  <header>
    <h1>🆘 Tablero de Insumos</h1>
    <p>Reportes en tiempo real hospitales y centros de acopio</p>
  </header>

  <!-- Tabs móviles -->
  <div id="mobile-tabs">
    <button class="tab-btn activo" data-tab="tablero">📋 Tablero</button>
    <button class="tab-btn" data-tab="reportar">📝 Reportar</button>
  </div>

  <div id="app-layout">

    <!-- Sidebar izquierda: formulario -->
    <aside id="sidebar">
      <div id="error-msg"></div>

      <form id="form-insumo">
        <div>
          <label for="centro">Nombre del centro</label>
          <input type="text" id="centro" placeholder="Ej: Hospital Universitario" required />
        </div>
        <div>
          <label for="insumo">Insumo</label>
          <input type="text" id="insumo" placeholder="Ej: Sangre O+, Agua, Guantes" required />
        </div>
        <div>
          <label for="estado">Estado</label>
          <select id="estado" required>
            <option value="" disabled selected>Seleccionar</option>
            <option value="falta">Falta</option>
            <option value="sobra">Sobra</option>
          </select>
        </div>

        <!-- Teléfono de contacto -->
        <div>
          <label for="telefono">Teléfono de contacto</label>
          <input type="tel" id="telefono" placeholder="Ej: 0412-1234567" />
        </div>

        <!-- Ubicación (campos ocultos + botón de geolocalización) -->
        <div>
          <label>Ubicación</label>
          <div class="ubicacion-row">
            <input type="text" id="input-ubicacion" placeholder="Presiona el botón para obtener ubicación" readonly />
            <button type="button" class="btn-ubicacion" id="btn-ubicacion">📍 Obtener</button>
          </div>
          <input type="hidden" id="input-lat" />
          <input type="hidden" id="input-lng" />
        </div>

        <!-- Reporte rápido: insumos predefinidos -->
        <div id="reporte-rapido">
          <h3>⚡ Reporte rápido</h3>
          <div class="rapido-toggle">
            <button class="activo" data-rapido-estado="falta">❌ Falta</button>
            <button data-rapido-estado="sobra">✅ Sobra</button>
          </div>
          <div class="rapido-grid" id="rapido-grid"></div>
        </div>

        <button type="submit" class="btn" id="btn-enviar">Reportar insumo</button>
      </form>
    </aside>

    <!-- Contenido derecha: mapa, filtros y tablero -->
    <main id="content">
      <div class="map-col">
        <!-- Buscador de lugares -->
        <div class="search-container">
          <input type="text" id="search-input" placeholder="🔍 Buscar lugar (hospital, centro, ciudad...)" autocomplete="off" />
          <ul class="search-results" id="search-results"></ul>
        </div>
        <div id="map-container"></div>
        <button class="map-toggle" id="map-toggle">🗺 Ocultar mapa</button>
      </div>
      <div class="feed-col">
        <div id="filtros">
          <button class="btn-filtro activo" data-filtro="todos">Mostrar todos</button>
          <button class="btn-filtro" data-filtro="falta">❌ FALTAN</button>
          <button class="btn-filtro" data-filtro="sobra">✅ SOBRAN</button>
          <button class="btn-filtro" id="btn-cerca">📍 Cerca de mí</button>
        </div>

        <div id="tablero">
          <p class="empty-msg">Esperando reportes...</p>
        </div>
      </div>
    </main>

  </div>

  <script>
    // ─── Onboarding (guía inicial) ────────────────────────────────
    const slides = [
      { icon: '📝', title: 'Reporta un insumo', text: 'Completa los datos del centro, insumo y ubicación en el formulario de la izquierda, luego presiona <strong>Reportar insumo</strong>.' },
      { icon: '🗺', title: 'Explora en el mapa', text: 'Haz clic en cualquier alerta para centrar el mapa. Usa <strong>Cómo llegar</strong> para abrir la ruta en Google Maps.' },
      { icon: '✅', title: 'Atiende alertas', text: 'Cuando veas una alerta que puedas resolver, presiona <strong>Atender</strong>, ingresa tu nombre y la alerta desaparecerá.' },
    ];

    const onboarding = document.getElementById('onboarding');

    if (localStorage.getItem('onboarding-visto')) {
      onboarding.classList.add('hidden');
    } else {
      const icon = document.getElementById('onb-icon');
      const title = document.getElementById('onb-title');
      const text = document.getElementById('onb-text');
      const dots = document.querySelectorAll('.dots span');
      const btnSiguiente = document.getElementById('onb-siguiente');
      const btnSaltar = document.getElementById('onb-saltar');
      let paso = 0;

      function mostrarPaso(i) {
        const s = slides[i];
        icon.textContent = s.icon;
        title.textContent = s.title;
        text.innerHTML = s.text;
        dots.forEach((d, j) => d.classList.toggle('active', j === i));
        btnSiguiente.textContent = i === slides.length - 1 ? 'Comenzar' : 'Siguiente';
      }

      btnSiguiente.addEventListener('click', () => {
        paso++;
        if (paso >= slides.length) {
          onboarding.classList.add('hidden');
          localStorage.setItem('onboarding-visto', 'true');
        } else {
          mostrarPaso(paso);
        }
      });

      btnSaltar.addEventListener('click', () => {
        onboarding.classList.add('hidden');
        localStorage.setItem('onboarding-visto', 'true');
      });

      mostrarPaso(0);
    }

    // ─── Conexión WebSocket ──────────────────────────────────────
    const socket = io();

    // ─── Referencias al DOM ──────────────────────────────────────
    const form = document.getElementById('form-insumo');
    const sidebar = document.getElementById('sidebar');
    const tablero = document.getElementById('tablero');
    const errorMsg = document.getElementById('error-msg');
    const btnEnviar = document.getElementById('btn-enviar');
    const btnUbicacion = document.getElementById('btn-ubicacion');
    const filtros = document.querySelectorAll('.btn-filtro');

    const inputCentro = document.getElementById('centro');
    const inputInsumo = document.getElementById('insumo');
    const selectEstado = document.getElementById('estado');
    const inputUbicacion = document.getElementById('input-ubicacion');
    const inputLat = document.getElementById('input-lat');
    const inputLng = document.getElementById('input-lng');
    const inputTelefono = document.getElementById('telefono');

    // ─── Tabs móviles ──────────────────────────────────────────────
    const appLayout = document.getElementById('app-layout');
    const tabBtns = document.querySelectorAll('#mobile-tabs .tab-btn');

    function activarTab(tab) {
      tabBtns.forEach(b => b.classList.toggle('activo', b.dataset.tab === tab));
      appLayout.classList.remove('tab-tablero', 'tab-reportar');
      appLayout.classList.add(`tab-${tab}`);
      if (tab === 'tablero') setTimeout(() => map.invalidateSize(), 100);
    }

    tabBtns.forEach(btn => {
      btn.addEventListener('click', () => activarTab(btn.dataset.tab));
    });

    // Default: tablero activo (solo en mobile se aplica por CSS)
    activarTab('tablero');

    // ─── Mapa Leaflet ─────────────────────────────────────────────
    const map = L.map('map-container').setView([10.5, -66.9167], 7); // Centro norte (Caracas)

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors',
      maxZoom: 18,
    }).addTo(map);

    // Grupo de marcadores (para poder limpiarlos/actualizarlos)
    const markersLayer = L.layerGroup().addTo(map);

    // Diccionario para mantener referencia a cada marcador por id del insumo
    const markersMap = {};

    // Clic en el mapa → colocar marcador de ubicación
    map.on('click', (e) => {
      actualizarMiUbicacion(e.latlng.lat, e.latlng.lng);
    });

    // ─── Buscador de lugares (Nominatim) ────────────────────────────
    const searchInput = document.getElementById('search-input');
    const searchResults = document.getElementById('search-results');
    let searchTimeout = null;

    function buscarLugar(query) {
      if (query.length < 3) { searchResults.classList.remove('visible'); return; }
      const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=6&countrycodes=ve&addressdetails=1`;

      fetch(url)
        .then((r) => r.json())
        .then((data) => {
          searchResults.innerHTML = '';
          if (!data || data.length === 0) {
            searchResults.classList.remove('visible');
            return;
          }
          data.forEach((item) => {
            const li = document.createElement('li');
            const tipo = item.type === 'hospital' ? '🏥' : item.type === 'city' ? '🏙' : '📍';
            const nombre = item.display_name.split(',')[0];
            const dir = item.display_name.split(',').slice(1, 4).join(',').trim();
            li.innerHTML = `<span class="sr-icon">${tipo}</span><div><div class="sr-name">${nombre}</div><div class="sr-dir">${dir}</div></div>`;
            li.dataset.lat = item.lat;
            li.dataset.lng = item.lon;
            li.dataset.nombre = nombre;
            li.addEventListener('click', seleccionarLugar);
            searchResults.appendChild(li);
          });
          searchResults.classList.add('visible');
        })
        .catch(() => { searchResults.classList.remove('visible'); });
    }

    function seleccionarLugar(e) {
      const li = e.currentTarget;
      const lat = parseFloat(li.dataset.lat);
      const lng = parseFloat(li.dataset.lng);
      const nombre = li.dataset.nombre;

      inputCentro.value = nombre;
      guardarCentro(nombre);
      actualizarMiUbicacion(lat, lng);
      inputUbicacion.readOnly = false;
      map.setView([lat, lng], 15);
      searchResults.classList.remove('visible');
      searchInput.value = nombre;
    }

    searchInput.addEventListener('input', () => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => buscarLugar(searchInput.value.trim()), 500);
    });

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.search-container')) searchResults.classList.remove('visible');
    });

    function agregarOMoverMarcador(registro) {
      const { id, lat, lng, centro, insumo, estado, telefono } = registro;
      if (!lat || !lng) return;

      const color = estado === 'falta' ? '#ef4444' : '#22c55e';
      const icon = L.divIcon({
        html: `<div style="
          width: 16px; height: 16px;
          background: ${color};
          border: 2px solid #fff;
          border-radius: 50%;
          box-shadow: 0 0 4px rgba(0,0,0,0.4);
        "></div>`,
        iconSize: [16, 16],
        iconAnchor: [8, 8],
        className: '',
      });

      const telHtml = telefono ? `<br>📞 <a href="tel:${telefono}" style="color:#3b82f6">${telefono}</a>` : '';
      const marker = L.marker([lat, lng], { icon })
        .bindPopup(`<b>${centro}</b><br>${insumo}${telHtml}<br><i>${estado === 'falta' ? '❌ Falta' : '✅ Sobra'}</i>`);

      // Si ya existía un marcador para este id, lo removemos primero
      if (markersMap[id]) {
        markersLayer.removeLayer(markersMap[id]);
      }

      markersLayer.addLayer(marker);
      markersMap[id] = marker;
    }

    function removerMarcador(id) {
      if (markersMap[id]) {
        markersLayer.removeLayer(markersMap[id]);
        delete markersMap[id];
      }
    }

    // ─── Geolocalización ──────────────────────────────────────────
    let miMarcador = null; // Marcador de "mi ubicación actual"

    function actualizarMiUbicacion(lat, lng) {
      inputLat.value = lat;
      inputLng.value = lng;
      inputUbicacion.value = `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
      map.setView([lat, lng], 13);

      // Mostrar marcador visual de dónde se reportará
      if (miMarcador) {
        miMarcador.setLatLng([lat, lng]);
      } else {
        const icon = L.divIcon({
          html: `<div style="
            width: 20px; height: 20px;
            background: #3b82f6;
            border: 3px solid #fff;
            border-radius: 50%;
            box-shadow: 0 0 6px rgba(59,130,246,0.6);
          "></div>`,
          iconSize: [20, 20],
          iconAnchor: [10, 10],
          className: '',
        });
        miMarcador = L.marker([lat, lng], { icon })
          .addTo(map)
          .bindPopup('📍 Tu ubicación (se reportará aquí)')
          .openPopup();
      }
    }

    function obtenerUbicacion() {
      if (!navigator.geolocation) {
        mostrarError('Tu navegador no soporta geolocalización.');
        return;
      }

      btnUbicacion.classList.add('obteniendo');
      btnUbicacion.textContent = 'Obteniendo...';

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const { latitude, longitude } = pos.coords;
          actualizarMiUbicacion(latitude, longitude);
          inputUbicacion.readOnly = false;
          btnUbicacion.classList.remove('obteniendo');
          btnUbicacion.textContent = '📍 Obtener';
        },
        (err) => {
          mostrarError('No se pudo obtener ubicación. Intenta escribirla manualmente.');
          inputUbicacion.readOnly = false;
          inputUbicacion.placeholder = 'Ej: 10.4806, -66.9036 (lat, lng)';
          btnUbicacion.classList.remove('obteniendo');
          btnUbicacion.textContent = '📍 Obtener';
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    }

    btnUbicacion.addEventListener('click', obtenerUbicacion);

    // Permitir escritura manual de coordenadas en el campo de ubicación
    inputUbicacion.addEventListener('input', () => {
      const partes = inputUbicacion.value.split(',').map((s) => s.trim());
      if (partes.length === 2) {
        const lat = parseFloat(partes[0]);
        const lng = parseFloat(partes[1]);
        if (!isNaN(lat) && !isNaN(lng)) {
          actualizarMiUbicacion(lat, lng);
        }
      }
    });

    // ─── Recordar último centro ─────────────────────────────────────
    const CENTRO_KEY = 'ultimo-centro';
    function guardarCentro(nombre) {
      if (nombre) localStorage.setItem(CENTRO_KEY, nombre);
    }
    function restaurarCentro() {
      const saved = localStorage.getItem(CENTRO_KEY);
      if (saved) inputCentro.value = saved;
    }

    // ─── Reporte rápido (insumos predefinidos) ──────────────────────
    const INSUMOS_PREDEFINIDOS = [
      { emoji: '🩸', nombre: 'Sangre O+' },
      { emoji: '💧', nombre: 'Agua potable' },
      { emoji: '🧤', nombre: 'Guantes' },
      { emoji: '😷', nombre: 'Mascarillas' },
      { emoji: '🩹', nombre: 'Gasas/Vendas' },
      { emoji: '💊', nombre: 'Medicamentos' },
      { emoji: '🧴', nombre: 'Alcohol/Gel' },
      { emoji: '🛏', nombre: 'Camas' },
    ];

    let rapidoEstado = 'falta';
    const rapidoGrid = document.getElementById('rapido-grid');
    const rapidoToggles = document.querySelectorAll('.rapido-toggle button');

    rapidoToggles.forEach((btn) => {
      btn.addEventListener('click', () => {
        rapidoToggles.forEach((b) => b.classList.remove('activo'));
        btn.classList.add('activo');
        rapidoEstado = btn.dataset.rapidoEstado;
      });
    });

    function renderizarBotonesRapidos() {
      rapidoGrid.innerHTML = '';
      INSUMOS_PREDEFINIDOS.forEach((item) => {
        const btn = document.createElement('button');
        btn.className = 'btn-rapido';
        btn.innerHTML = `<span class="emoji">${item.emoji}</span>${item.nombre}`;
        btn.addEventListener('click', () => {
          inputInsumo.value = item.nombre;
          selectEstado.value = rapidoEstado;
          if (!inputCentro.value.trim()) {
            inputCentro.focus();
          }
        });
        rapidoGrid.appendChild(btn);
      });
    }
    renderizarBotonesRapidos();
    restaurarCentro();

    // ─── Toggle mapa en mobile ──────────────────────────────────
    const mapToggle = document.getElementById('map-toggle');
    const mapCol = document.querySelector('.map-col');
    if (mapToggle) {
      mapToggle.addEventListener('click', () => {
        mapCol.classList.toggle('collapsed');
        mapToggle.textContent = mapCol.classList.contains('collapsed') ? '🗺 Mostrar mapa' : '🗺 Ocultar mapa';
        setTimeout(() => map.invalidateSize(), 300);
      });
    }

    // ─── Utilidad: mostrar/ocultar mensaje de error ──────────────
    function mostrarError(texto) {
      errorMsg.textContent = texto;
      errorMsg.classList.add('visible');
      setTimeout(() => errorMsg.classList.remove('visible'), 4000);
    }

    // ─── Renderizar una tarjeta de insumo ────────────────────────
    function crearCard(registro) {
      const estado = registro.estado;
      const fecha = new Date(registro.created_at).toLocaleString('es-VE', {
        day: '2-digit', month: '2-digit', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
      const tieneUbicacion = registro.lat && registro.lng;
      const telefono = registro.telefono || '';

      const card = document.createElement('div');
      card.className = `card ${estado}`;
      card.id = `insumo-${registro.id}`;
      card.dataset.estado = estado;
      card.dataset.id = registro.id;
      if (tieneUbicacion) {
        card.dataset.lat = registro.lat;
        card.dataset.lng = registro.lng;
      }

      const botonesExtra = tieneUbicacion
        ? `<a class="btn-ruta" href="https://www.google.com/maps/dir/?api=1&destination=${registro.lat},${registro.lng}" target="_blank" rel="noopener">🗺 Cómo llegar</a>`
        : '';

      const telHtml = telefono
        ? `<span style="font-size:0.75rem;color:var(--color-muted);margin-top:0.1rem">📞 ${telefono}</span>`
        : '';

      const textCompartir = `${estado === 'falta' ? '❌ FALTA' : '✅ SOBRA'} ${registro.insumo} en ${registro.centro}${telefono ? ' — Contacto: ' + telefono : ''} 🆘 Tablero de Insumos`;
      const urlCompartir = window.location.href;

      card.innerHTML = `
        <div class="card-info">
          <span class="centro">${registro.centro}</span>
          <span class="insumo">${registro.insumo}</span>
          ${telHtml}
          <time>${fecha} ${tieneUbicacion ? '📍' : ''}</time>
        </div>
        <div class="card-actions">
          <span class="card-badge">${estado === 'falta' ? '❌ Falta' : '✅ Sobra'}</span>
          ${botonesExtra}
          <button class="btn-compartir" title="Compartir" data-compartir="${textCompartir}"><span class="cp-icon">↗</span><span class="cp-text"> Compartir</span></button>
          <button class="btn-atender" data-id="${registro.id}">Atender</button>
        </div>
      `;
      return card;
    }

    // ─── Insertar un insumo en el tablero (al inicio) ────────────
    function poblarTablero(registros) {
      tablero.innerHTML = '';

      if (registros.length === 0) {
        tablero.innerHTML = '<p class="empty-msg">Esperando reportes...</p>';
        return;
      }

      registros.forEach((r) => {
        const card = crearCard(r);
        tablero.appendChild(card);
      });
    }

    // ─── Agregar un insumo nuevo al inicio del tablero ───────────
    function agregarInsumo(registro) {
      const empty = tablero.querySelector('.empty-msg');
      if (empty) empty.remove();

      const card = crearCard(registro);
      tablero.prepend(card);
      aplicarFiltro();
    }

    // ─── Filtros rápidos ──────────────────────────────────────────
    let filtroActivo = 'todos';
    let ubicacionUsuario = null;
    let proximidadActiva = false;
    const RADIO_KM = 100;

    function distanciaKm(lat1, lng1, lat2, lng2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLng = (lng2 - lng1) * Math.PI / 180;
      const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function aplicarFiltro() {
      const cards = tablero.querySelectorAll('.card');
      cards.forEach((card) => {
        let visible = true;
        if (filtroActivo !== 'todos') {
          visible = card.dataset.estado === filtroActivo;
        }
        if (visible && proximidadActiva && ubicacionUsuario) {
          const lat = parseFloat(card.dataset.lat);
          const lng = parseFloat(card.dataset.lng);
          if (!lat || !lng || distanciaKm(ubicacionUsuario.lat, ubicacionUsuario.lng, lat, lng) > RADIO_KM) {
            visible = false;
          }
        }
        card.style.display = visible ? '' : 'none';
      });
    }

    filtros.forEach((btn) => {
      btn.addEventListener('click', () => {
        filtros.forEach((b) => b.classList.remove('activo'));
        btn.classList.add('activo');
        filtroActivo = btn.dataset.filtro;
        aplicarFiltro();
      });
    });

    const btnCerca = document.getElementById('btn-cerca');
    btnCerca.addEventListener('click', () => {
      if (proximidadActiva) {
        proximidadActiva = false;
        btnCerca.classList.remove('activo');
        btnCerca.textContent = '📍 Cerca de mí';
        aplicarFiltro();
        return;
      }
      if (!navigator.geolocation) {
        mostrarError('Tu navegador no soporta geolocalización.');
        return;
      }
      btnCerca.textContent = '📍 Obteniendo...';
      btnCerca.disabled = true;
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          ubicacionUsuario = { lat: pos.coords.latitude, lng: pos.coords.longitude };
          proximidadActiva = true;
          btnCerca.classList.add('activo');
          btnCerca.textContent = `📍 Cerca de mí (${RADIO_KM}km)`;
          btnCerca.disabled = false;
          map.setView([ubicacionUsuario.lat, ubicacionUsuario.lng], 10);
          aplicarFiltro();
        },
        () => {
          mostrarError('No se pudo obtener tu ubicación para el filtro.');
          btnCerca.textContent = '📍 Cerca de mí';
          btnCerca.disabled = false;
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    });

    // ─── Eventos del servidor (WebSocket) ────────────────────────

    // Carga inicial: poblar tablero + agregar marcadores al mapa
    socket.on('insumos-iniciales', (registros) => {
      poblarTablero(registros);
      registros.forEach((r) => agregarOMoverMarcador(r));
    });

    // Nuevo insumo en tiempo real
    socket.on('insumo-nuevo', (registro) => {
      agregarInsumo(registro);
      agregarOMoverMarcador(registro);
    });

    // Alerta resuelta: animar card y remover marcador del mapa
    socket.on('alerta_resuelta', (data) => {
      const card = document.getElementById(`insumo-${data.id}`);
      if (card) {
        card.classList.add('resolviendo');
        setTimeout(() => {
          card.remove();
        }, 500);
      }
      removerMarcador(data.id);
    });

    // Error enviado por el servidor
    socket.on('error', (data) => {
      mostrarError(data.mensaje);
    });

    // ─── Envío del formulario (con rate limiting + ubicación) ────
    form.addEventListener('submit', (e) => {
      e.preventDefault();

      const payload = {
        centro: inputCentro.value.trim(),
        insumo: inputInsumo.value.trim(),
        estado: selectEstado.value,
        lat: inputLat.value ? parseFloat(inputLat.value) : null,
        lng: inputLng.value ? parseFloat(inputLng.value) : null,
        telefono: inputTelefono.value.trim() || null,
      };

      if (!payload.centro || !payload.insumo || !payload.estado) {
        mostrarError('Todos los campos son obligatorios.');
        return;
      }

      // Rate limiting: deshabilitar botón 3 segundos
      btnEnviar.disabled = true;
      btnEnviar.textContent = 'Enviando...';
      setTimeout(() => {
        btnEnviar.disabled = false;
        btnEnviar.textContent = 'Reportar insumo';
      }, 3000);

      guardarCentro(payload.centro);
      socket.emit('nuevo-insumo', payload);
      form.reset();
      selectEstado.value = '';
      inputLat.value = '';
      inputLng.value = '';
      inputUbicacion.value = '';
      inputUbicacion.readOnly = true;
      inputUbicacion.placeholder = 'Presiona el botón para obtener ubicación';
      activarTab('tablero');
      if (miMarcador) {
        map.removeLayer(miMarcador);
        miMarcador = null;
      }
    });

    // ─── Delegación de eventos en el tablero ──────────────────────
    tablero.addEventListener('click', (e) => {
      // Botón "Atender"
      const btn = e.target.closest('.btn-atender');
      if (btn) {
        const id = btn.dataset.id;
        const nombreVoluntario = prompt('Ingresa tu nombre para atender esta alerta:');
        if (!nombreVoluntario || nombreVoluntario.trim() === '') return;
        socket.emit('marcar_resuelto', { id: Number(id), nombreVoluntario: nombreVoluntario.trim() });
        return;
      }

      // Botón "Compartir"
      const btnCompartir = e.target.closest('.btn-compartir');
      if (btnCompartir) {
        const texto = btnCompartir.dataset.compartir;
        if (navigator.share) {
          navigator.share({ title: 'Tablero de Insumos', text: texto, url: window.location.href })
            .catch(() => { });
        } else {
          navigator.clipboard.writeText(texto + ' — ' + window.location.href)
            .then(() => mostrarError('📋 Información copiada al portapapeles'))
            .catch(() => mostrarError('No se pudo copiar.'));
        }
        return;
      }

      // Clic en la tarjeta → centrar mapa en el marcador
      const card = e.target.closest('.card');
      if (card && !e.target.closest('.btn-atender') && !e.target.closest('.btn-ruta') && !e.target.closest('.btn-compartir')) {
        const lat = card.dataset.lat;
        const lng = card.dataset.lng;
        if (lat && lng) {
          map.setView([parseFloat(lat), parseFloat(lng)], 15);
          const id = card.dataset.id;
          if (markersMap[id]) markersMap[id].openPopup();
        }
        return;
      }
    });
  </script>
</body>

</html>
