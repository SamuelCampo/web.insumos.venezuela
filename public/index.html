<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tablero de Insumos - Emergencia</title>

  <!-- Leaflet (mapa) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Socket.io cliente -->
  <script src="/socket.io/socket.io.js"></script>

  <style>
    /* ─── Reset y variables ─────────────────────────────────────── */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --color-bg: #0f172a;
      --color-surface: #1e293b;
      --color-text: #f1f5f9;
      --color-muted: #94a3b8;
      --color-falta: #ef4444;
      --color-sobra: #22c55e;
      --color-primary: #3b82f6;
      --radius: 12px;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      padding: 1.5rem 1rem;
    }

    /* ─── Layout de dos columnas en escritorio ─────────────────── */
    #app-layout {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    @media (min-width: 1024px) {
      body {
        padding: 1.5rem 2rem;
      }

      #app-layout {
        flex-direction: row;
        align-items: flex-start;
      }

      #sidebar {
        width: 380px;
        flex-shrink: 0;
        overflow: hidden;
        transition: width 0.3s ease, margin 0.3s ease;
      }

      #sidebar.closed {
        width: 0;
        margin-right: 0;
      }

      #content {
        flex: 1;
        min-width: 0;
      }
    }

    /* ─── Header ──────────────────────────────────────────────── */
    header {
      text-align: center;
      margin-bottom: 1.5rem;
      max-width: 1400px;
      margin-left: auto;
      margin-right: auto;
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    header p {
      color: var(--color-muted);
      font-size: 0.95rem;
      margin-top: 0.3rem;
    }

    /* ─── Formulario ──────────────────────────────────────────── */
    #sidebar form {
      background: var(--color-surface);
      padding: 1.5rem;
      border-radius: var(--radius);
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    #sidebar form label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--color-muted);
    }

    #sidebar form input,
    #sidebar form select {
      background: var(--color-bg);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 0.7rem 0.9rem;
      color: var(--color-text);
      font-size: 1rem;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
    }

    #sidebar form input:focus,
    #sidebar form select:focus {
      border-color: var(--color-primary);
    }

    @media (max-width: 1023px) {
      #sidebar form {
        max-width: 500px;
      }

      #sidebar {
        margin: 0 auto;
        width: 100%;
        max-width: 500px;
      }

      #content {
        width: 100%;
        max-width: 800px;
        margin: 0 auto;
      }
    }

    .btn {
      background: var(--color-primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.75rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-atender {
      background: transparent;
      border: 1px solid var(--color-muted);
      color: var(--color-muted);
      border-radius: 8px;
      padding: 0.4rem 0.8rem;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-atender:hover,
    .btn-ruta:hover {
      border-color: var(--color-primary);
      color: var(--color-primary);
    }

    .btn-ruta {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--color-muted);
      border-radius: 8px;
      padding: 0.3rem 0.6rem;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
    }

    .btn-ruta:hover {
      border-color: #22c55e;
      color: #22c55e;
    }

    .card {
      cursor: pointer;
    }

    .card:hover {
      border-color: var(--color-primary);
    }

    /* ─── Grid de tarjetas ────────────────────────────────────── */
    #tablero {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .card {
      background: var(--color-surface);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      border-left: 5px solid var(--color-muted);
      animation: fadeIn 0.3s ease;
      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    .card.falta {
      border-left-color: var(--color-falta);
    }

    .card.sobra {
      border-left-color: var(--color-sobra);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card-info {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .card-info .centro {
      font-weight: 600;
      font-size: 1rem;
    }

    .card-info .insumo {
      color: var(--color-muted);
      font-size: 0.9rem;
    }

    .card-badge {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      padding: 0.35rem 0.8rem;
      border-radius: 999px;
      white-space: nowrap;
    }

    .card.falta .card-badge {
      background: rgba(239, 68, 68, 0.2);
      color: var(--color-falta);
    }

    .card.sobra .card-badge {
      background: rgba(34, 197, 94, 0.2);
      color: var(--color-sobra);
    }

    .card time {
      font-size: 0.7rem;
      color: var(--color-muted);
      display: block;
      margin-top: 0.15rem;
    }

    .card-actions {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    /* Estado resolviendo (fade-out) */
    .card.resolviendo {
      opacity: 0.5;
      transition: opacity 0.5s ease;
      pointer-events: none;
    }

    /* ─── Filtros rápidos ──────────────────────────────────────── */
    #filtros {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      width: 100%;
    }

    .btn-filtro {
      background: var(--color-surface);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--color-muted);
      border-radius: 8px;
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-filtro:hover {
      border-color: var(--color-primary);
      color: var(--color-text);
    }

    .btn-filtro.activo {
      background: var(--color-primary);
      border-color: var(--color-primary);
      color: #fff;
    }

    /* ─── Mapa ────────────────────────────────────────────────── */
    #map-container {
      width: 100%;
      height: 350px;
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 1.5rem;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    @media (min-width: 1024px) {
      #map-container {
        height: 400px;
      }
    }

    #map-container .leaflet-container {
      background: var(--color-surface);
    }

    /* Ubicación en formulario */
    .ubicacion-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .ubicacion-row input {
      flex: 1;
    }

    .btn-ubicacion {
      background: var(--color-surface);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--color-muted);
      border-radius: 8px;
      padding: 0.7rem;
      font-size: 0.85rem;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .btn-ubicacion:hover {
      border-color: var(--color-primary);
      color: var(--color-primary);
    }

    .btn-ubicacion.obteniendo {
      opacity: 0.5;
      pointer-events: none;
    }

    /* ─── Estados vacío / error ───────────────────────────────── */
    .empty-msg {
      text-align: center;
      color: var(--color-muted);
      padding: 3rem 0;
      font-style: italic;
    }

    #error-msg {
      background: rgba(239, 68, 68, 0.15);
      color: var(--color-falta);
      padding: 0.6rem 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      display: none;
      width: 100%;
      margin-bottom: 1rem;
      text-align: center;
    }

    #error-msg.visible {
      display: block;
    }

    /* ─── FAB: botón flotante para abrir/cerrar formulario ─────── */
    #btn-fab {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--color-primary);
      color: #fff;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(59, 130, 246, 0.4);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.3s, background 0.3s;
    }

    #btn-fab:hover {
      transform: scale(1.1);
    }

    #btn-fab.abierto {
      background: var(--color-falta);
      transform: rotate(45deg);
    }

    /* Sidebar colapsada */
    #sidebar.closed {
      overflow: hidden;
      transition: width 0.3s ease;
    }

    @media (min-width: 1024px) {
      #sidebar.closed {
        width: 0 !important;
        margin: 0 !important;
        padding: 0 !important;
      }
    }

    @media (max-width: 1023px) {
      #sidebar.closed {
        display: none;
      }
    }

    /* ─── Onboarding ──────────────────────────────────────────── */
    #onboarding {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }

    #onboarding.hidden {
      display: none;
    }

    .onboarding-card {
      background: var(--color-surface);
      border-radius: var(--radius);
      padding: 2rem 1.5rem 1.5rem;
      max-width: 420px;
      width: 90%;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .onboarding-card .icon {
      font-size: 2.5rem;
      margin-bottom: 0.75rem;
    }

    .onboarding-card h2 {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .onboarding-card p {
      color: var(--color-muted);
      font-size: 0.9rem;
      line-height: 1.5;
      margin-bottom: 1.5rem;
    }

    .onboarding-card .dots {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }

    .onboarding-card .dots span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.15);
      transition: background 0.3s;
    }

    .onboarding-card .dots span.active {
      background: var(--color-primary);
    }

    .onboarding-card .btn-row {
      display: flex;
      gap: 0.75rem;
    }

    .onboarding-card .btn-row button {
      flex: 1;
      padding: 0.65rem;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.2s;
    }

    .onboarding-card .btn-saltar {
      background: transparent;
      color: var(--color-muted);
      border: 1px solid rgba(255, 255, 255, 0.1) !important;
    }

    .onboarding-card .btn-siguiente {
      background: var(--color-primary);
      color: #fff;
    }

    .onboarding-card .btn-siguiente:hover {
      opacity: 0.9;
    }

    .onboarding-card .btn-saltar:hover {
      border-color: var(--color-primary);
      color: var(--color-text);
    }

    /* ─── Responsive ──────────────────────────────────────────── */
    @media (max-width: 480px) {
      .card {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>

<body>

  <!-- Onboarding (primera vez) -->
  <div id="onboarding">
    <div class="onboarding-card">
      <div class="icon" id="onb-icon">📝</div>
      <h2 id="onb-title">Reporta un insumo</h2>
      <p id="onb-text">Presiona el botón <strong>+</strong> flotante, completa los datos del centro, insumo y ubicación, luego envía el reporte.</p>
      <div class="dots">
        <span class="active"></span>
        <span></span>
        <span></span>
      </div>
      <div class="btn-row">
        <button class="btn-saltar" id="onb-saltar">Saltar</button>
        <button class="btn-siguiente" id="onb-siguiente">Siguiente</button>
      </div>
    </div>
  </div>

  <header>
    <h1>🆘 Tablero de Insumos</h1>
    <p>Reportes en tiempo real hospitales y centros de acopio</p>
  </header>

  <div id="app-layout">

    <!-- Sidebar izquierda: formulario -->
    <aside id="sidebar" class="closed">
      <div id="error-msg"></div>

      <form id="form-insumo">
        <div>
          <label for="centro">Nombre del centro</label>
          <input type="text" id="centro" placeholder="Ej: Hospital Universitario" required />
        </div>
        <div>
          <label for="insumo">Insumo</label>
          <input type="text" id="insumo" placeholder="Ej: Sangre O+, Agua, Guantes" required />
        </div>
        <div>
          <label for="estado">Estado</label>
          <select id="estado" required>
            <option value="" disabled selected>Seleccionar</option>
            <option value="falta">Falta</option>
            <option value="sobra">Sobra</option>
          </select>
        </div>

        <!-- Teléfono de contacto -->
        <div>
          <label for="telefono">Teléfono de contacto</label>
          <input type="tel" id="telefono" placeholder="Ej: 0412-1234567" />
        </div>

        <!-- Ubicación (campos ocultos + botón de geolocalización) -->
        <div>
          <label>Ubicación</label>
          <div class="ubicacion-row">
            <input type="text" id="input-ubicacion" placeholder="Presiona el botón para obtener ubicación" readonly />
            <button type="button" class="btn-ubicacion" id="btn-ubicacion">📍 Obtener</button>
          </div>
          <input type="hidden" id="input-lat" />
          <input type="hidden" id="input-lng" />
        </div>

        <button type="submit" class="btn" id="btn-enviar">Reportar insumo</button>
      </form>
    </aside>

    <!-- Contenido derecha: mapa, filtros y tablero -->
    <main id="content">
      <div id="map-container"></div>

      <div id="filtros">
        <button class="btn-filtro activo" data-filtro="todos">Mostrar todos</button>
        <button class="btn-filtro" data-filtro="falta">❌ Ver solo FALTAN</button>
        <button class="btn-filtro" data-filtro="sobra">✅ Ver solo SOBRAN</button>
      </div>

      <div id="tablero">
        <p class="empty-msg">Esperando reportes...</p>
      </div>
    </main>

  </div>

  <!-- Botón flotante para reportar (aparece cuando form está oculto) -->
  <button id="btn-fab" title="Reportar insumo">+</button>

  <script>
    // ─── Onboarding (guía inicial) ────────────────────────────────
    const slides = [
      { icon: '📝', title: 'Reporta un insumo', text: 'Presiona el botón <strong>+</strong> flotante, completa los datos del centro, insumo y ubicación, luego envía el reporte.' },
      { icon: '🗺', title: 'Explora en el mapa', text: 'Haz clic en cualquier alerta para centrar el mapa. Usa <strong>Cómo llegar</strong> para abrir la ruta en Google Maps.' },
      { icon: '✅', title: 'Atiende alertas', text: 'Cuando veas una alerta que puedas resolver, presiona <strong>Atender</strong>, ingresa tu nombre y la alerta desaparecerá.' },
    ];

    const onboarding = document.getElementById('onboarding');

    if (localStorage.getItem('onboarding-visto')) {
      onboarding.classList.add('hidden');
    } else {
      const icon = document.getElementById('onb-icon');
      const title = document.getElementById('onb-title');
      const text = document.getElementById('onb-text');
      const dots = document.querySelectorAll('.dots span');
      const btnSiguiente = document.getElementById('onb-siguiente');
      const btnSaltar = document.getElementById('onb-saltar');
      let paso = 0;

      function mostrarPaso(i) {
        const s = slides[i];
        icon.textContent = s.icon;
        title.textContent = s.title;
        text.innerHTML = s.text;
        dots.forEach((d, j) => d.classList.toggle('active', j === i));
        btnSiguiente.textContent = i === slides.length - 1 ? 'Comenzar' : 'Siguiente';
      }

      btnSiguiente.addEventListener('click', () => {
        paso++;
        if (paso >= slides.length) {
          onboarding.classList.add('hidden');
          localStorage.setItem('onboarding-visto', 'true');
        } else {
          mostrarPaso(paso);
        }
      });

      btnSaltar.addEventListener('click', () => {
        onboarding.classList.add('hidden');
        localStorage.setItem('onboarding-visto', 'true');
      });

      mostrarPaso(0);
    }

    // ─── Conexión WebSocket ──────────────────────────────────────
    const socket = io();

    // ─── Referencias al DOM ──────────────────────────────────────
    const form = document.getElementById('form-insumo');
    const sidebar = document.getElementById('sidebar');
    const tablero = document.getElementById('tablero');
    const errorMsg = document.getElementById('error-msg');
    const btnEnviar = document.getElementById('btn-enviar');
    const btnUbicacion = document.getElementById('btn-ubicacion');
    const btnFab = document.getElementById('btn-fab');
    const filtros = document.querySelectorAll('.btn-filtro');

    const inputCentro = document.getElementById('centro');
    const inputInsumo = document.getElementById('insumo');
    const selectEstado = document.getElementById('estado');
    const inputUbicacion = document.getElementById('input-ubicacion');
    const inputLat = document.getElementById('input-lat');
    const inputLng = document.getElementById('input-lng');
    const inputTelefono = document.getElementById('telefono');

    // ─── Mapa Leaflet ─────────────────────────────────────────────
    const map = L.map('map-container').setView([6.4238, -66.5897], 6); // Centro de Venezuela

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors',
      maxZoom: 18,
    }).addTo(map);

    // Grupo de marcadores (para poder limpiarlos/actualizarlos)
    const markersLayer = L.layerGroup().addTo(map);

    // Diccionario para mantener referencia a cada marcador por id del insumo
    const markersMap = {};

    function agregarOMoverMarcador(registro) {
      const { id, lat, lng, centro, insumo, estado, telefono } = registro;
      if (!lat || !lng) return;

      const color = estado === 'falta' ? '#ef4444' : '#22c55e';
      const icon = L.divIcon({
        html: `<div style="
          width: 16px; height: 16px;
          background: ${color};
          border: 2px solid #fff;
          border-radius: 50%;
          box-shadow: 0 0 4px rgba(0,0,0,0.4);
        "></div>`,
        iconSize: [16, 16],
        iconAnchor: [8, 8],
        className: '',
      });

      const telHtml = telefono ? `<br>📞 <a href="tel:${telefono}" style="color:#3b82f6">${telefono}</a>` : '';
      const marker = L.marker([lat, lng], { icon })
        .bindPopup(`<b>${centro}</b><br>${insumo}${telHtml}<br><i>${estado === 'falta' ? '❌ Falta' : '✅ Sobra'}</i>`);

      // Si ya existía un marcador para este id, lo removemos primero
      if (markersMap[id]) {
        markersLayer.removeLayer(markersMap[id]);
      }

      markersLayer.addLayer(marker);
      markersMap[id] = marker;
    }

    function removerMarcador(id) {
      if (markersMap[id]) {
        markersLayer.removeLayer(markersMap[id]);
        delete markersMap[id];
      }
    }

    // ─── Geolocalización ──────────────────────────────────────────
    let miMarcador = null; // Marcador de "mi ubicación actual"

    function actualizarMiUbicacion(lat, lng) {
      inputLat.value = lat;
      inputLng.value = lng;
      inputUbicacion.value = `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
      map.setView([lat, lng], 13);

      // Mostrar marcador visual de dónde se reportará
      if (miMarcador) {
        miMarcador.setLatLng([lat, lng]);
      } else {
        const icon = L.divIcon({
          html: `<div style="
            width: 20px; height: 20px;
            background: #3b82f6;
            border: 3px solid #fff;
            border-radius: 50%;
            box-shadow: 0 0 6px rgba(59,130,246,0.6);
          "></div>`,
          iconSize: [20, 20],
          iconAnchor: [10, 10],
          className: '',
        });
        miMarcador = L.marker([lat, lng], { icon })
          .addTo(map)
          .bindPopup('📍 Tu ubicación (se reportará aquí)')
          .openPopup();
      }
    }

    function obtenerUbicacion() {
      if (!navigator.geolocation) {
        mostrarError('Tu navegador no soporta geolocalización.');
        return;
      }

      btnUbicacion.classList.add('obteniendo');
      btnUbicacion.textContent = 'Obteniendo...';

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const { latitude, longitude } = pos.coords;
          actualizarMiUbicacion(latitude, longitude);
          inputUbicacion.readOnly = false;
          btnUbicacion.classList.remove('obteniendo');
          btnUbicacion.textContent = '📍 Obtener';
        },
        (err) => {
          mostrarError('No se pudo obtener ubicación. Intenta escribirla manualmente.');
          inputUbicacion.readOnly = false;
          inputUbicacion.placeholder = 'Ej: 10.4806, -66.9036 (lat, lng)';
          btnUbicacion.classList.remove('obteniendo');
          btnUbicacion.textContent = '📍 Obtener';
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    }

    btnUbicacion.addEventListener('click', obtenerUbicacion);

    // Permitir escritura manual de coordenadas en el campo de ubicación
    inputUbicacion.addEventListener('input', () => {
      const partes = inputUbicacion.value.split(',').map((s) => s.trim());
      if (partes.length === 2) {
        const lat = parseFloat(partes[0]);
        const lng = parseFloat(partes[1]);
        if (!isNaN(lat) && !isNaN(lng)) {
          actualizarMiUbicacion(lat, lng);
        }
      }
    });

    // ─── Utilidad: mostrar/ocultar mensaje de error ──────────────
    function mostrarError(texto) {
      errorMsg.textContent = texto;
      errorMsg.classList.add('visible');
      setTimeout(() => errorMsg.classList.remove('visible'), 4000);
    }

    // ─── Renderizar una tarjeta de insumo ────────────────────────
    function crearCard(registro) {
      const estado = registro.estado;
      const fecha = new Date(registro.created_at).toLocaleString('es-VE', {
        day: '2-digit', month: '2-digit', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
      const tieneUbicacion = registro.lat && registro.lng;
      const telefono = registro.telefono || '';

      const card = document.createElement('div');
      card.className = `card ${estado}`;
      card.id = `insumo-${registro.id}`;
      card.dataset.estado = estado;
      card.dataset.id = registro.id;
      if (tieneUbicacion) {
        card.dataset.lat = registro.lat;
        card.dataset.lng = registro.lng;
      }

      const botonesExtra = tieneUbicacion
        ? `<a class="btn-ruta" href="https://www.google.com/maps/dir/?api=1&destination=${registro.lat},${registro.lng}" target="_blank" rel="noopener">🗺 Cómo llegar</a>`
        : '';

      const telHtml = telefono
        ? `<span style="font-size:0.75rem;color:var(--color-muted);margin-top:0.1rem">📞 ${telefono}</span>`
        : '';

      card.innerHTML = `
        <div class="card-info">
          <span class="centro">${registro.centro}</span>
          <span class="insumo">${registro.insumo}</span>
          ${telHtml}
          <time>${fecha} ${tieneUbicacion ? '📍' : ''}</time>
        </div>
        <div class="card-actions">
          <span class="card-badge">${estado === 'falta' ? '❌ Falta' : '✅ Sobra'}</span>
          ${botonesExtra}
          <button class="btn-atender" data-id="${registro.id}">Atender</button>
        </div>
      `;
      return card;
    }

    // ─── Insertar un insumo en el tablero (al inicio) ────────────
    function poblarTablero(registros) {
      tablero.innerHTML = '';

      if (registros.length === 0) {
        tablero.innerHTML = '<p class="empty-msg">Esperando reportes...</p>';
        return;
      }

      registros.forEach((r) => {
        const card = crearCard(r);
        tablero.appendChild(card);
      });
    }

    // ─── Agregar un insumo nuevo al inicio del tablero ───────────
    function agregarInsumo(registro) {
      const empty = tablero.querySelector('.empty-msg');
      if (empty) empty.remove();

      const card = crearCard(registro);
      tablero.prepend(card);

      if (filtroActivo !== 'todos') {
        card.style.display = card.dataset.estado === filtroActivo ? '' : 'none';
      }
    }

    // ─── Filtros rápidos ──────────────────────────────────────────
    let filtroActivo = 'todos';

    function aplicarFiltro() {
      const cards = tablero.querySelectorAll('.card');
      cards.forEach((card) => {
        if (filtroActivo === 'todos') {
          card.style.display = '';
        } else {
          card.style.display = card.dataset.estado === filtroActivo ? '' : 'none';
        }
      });
    }

    filtros.forEach((btn) => {
      btn.addEventListener('click', () => {
        filtros.forEach((b) => b.classList.remove('activo'));
        btn.classList.add('activo');
        filtroActivo = btn.dataset.filtro;
        aplicarFiltro();
      });
    });

    // ─── Sidebar colapsable (formulario) ──────────────────────────
    function abrirSidebar() {
      sidebar.classList.remove('closed');
      btnFab.classList.add('abierto');
      btnFab.textContent = '✕';
    }

    function cerrarSidebar() {
      sidebar.classList.add('closed');
      btnFab.classList.remove('abierto');
      btnFab.textContent = '+';
    }

    function toggleSidebar() {
      if (sidebar.classList.contains('closed')) {
        abrirSidebar();
      } else {
        cerrarSidebar();
      }
    }

    btnFab.addEventListener('click', toggleSidebar);

    // Abrir sidebar automáticamente si está vacío
    function revisarSidebar() {
      const cards = tablero.querySelectorAll('.card');
      if (cards.length === 0) abrirSidebar();
    }

    // ─── Eventos del servidor (WebSocket) ────────────────────────

    // Carga inicial: poblar tablero + agregar marcadores al mapa
    socket.on('insumos-iniciales', (registros) => {
      poblarTablero(registros);
      registros.forEach((r) => agregarOMoverMarcador(r));
      revisarSidebar();
    });

    // Nuevo insumo en tiempo real
    socket.on('insumo-nuevo', (registro) => {
      agregarInsumo(registro);
      agregarOMoverMarcador(registro);
    });

    // Alerta resuelta: animar card y remover marcador del mapa
    socket.on('alerta_resuelta', (data) => {
      const card = document.getElementById(`insumo-${data.id}`);
      if (card) {
        card.classList.add('resolviendo');
        setTimeout(() => {
          card.remove();
          revisarSidebar();
        }, 500);
      }
      removerMarcador(data.id);
    });

    // Error enviado por el servidor
    socket.on('error', (data) => {
      mostrarError(data.mensaje);
    });

    // ─── Envío del formulario (con rate limiting + ubicación) ────
    form.addEventListener('submit', (e) => {
      e.preventDefault();

      const payload = {
        centro: inputCentro.value.trim(),
        insumo: inputInsumo.value.trim(),
        estado: selectEstado.value,
        lat: inputLat.value ? parseFloat(inputLat.value) : null,
        lng: inputLng.value ? parseFloat(inputLng.value) : null,
        telefono: inputTelefono.value.trim() || null,
      };

      if (!payload.centro || !payload.insumo || !payload.estado) {
        mostrarError('Todos los campos son obligatorios.');
        return;
      }

      // Rate limiting: deshabilitar botón 3 segundos
      btnEnviar.disabled = true;
      btnEnviar.textContent = 'Enviando...';
      setTimeout(() => {
        btnEnviar.disabled = false;
        btnEnviar.textContent = 'Reportar insumo';
      }, 3000);

      socket.emit('nuevo-insumo', payload);
      form.reset();
      inputUbicacion.value = '';
      inputUbicacion.readOnly = true;
      inputUbicacion.placeholder = 'Presiona el botón para obtener ubicación';
      if (miMarcador) {
        map.removeLayer(miMarcador);
        miMarcador = null;
      }
      cerrarSidebar();
    });

    // ─── Delegación de eventos en el tablero ──────────────────────
    tablero.addEventListener('click', (e) => {
      // Botón "Atender"
      const btn = e.target.closest('.btn-atender');
      if (btn) {
        const id = btn.dataset.id;
        const nombreVoluntario = prompt('Ingresa tu nombre para atender esta alerta:');
        if (!nombreVoluntario || nombreVoluntario.trim() === '') return;
        socket.emit('marcar_resuelto', { id: Number(id), nombreVoluntario: nombreVoluntario.trim() });
        return;
      }

      // Clic en la tarjeta → centrar mapa en el marcador
      const card = e.target.closest('.card');
      if (card && !e.target.closest('.btn-atender') && !e.target.closest('.btn-ruta')) {
        const lat = card.dataset.lat;
        const lng = card.dataset.lng;
        if (lat && lng) {
          map.setView([parseFloat(lat), parseFloat(lng)], 15);
          const id = card.dataset.id;
          if (markersMap[id]) markersMap[id].openPopup();
        }
        return;
      }
    });
  </script>
</body>

</html>
